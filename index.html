    <script>
      (function () {
        var theme = 'dark';
        try {
          var savedTheme = localStorage.getItem('portfolio-theme');
          if (savedTheme === 'light' || savedTheme === 'dark') theme = savedTheme;
        } catch (error) {}
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.classList.add('intro-theme-' + theme);

        var forceIntro = location.search.indexOf('replay-intro=1') > -1;
        var navigationEntry = performance.getEntriesByType && performance.getEntriesByType('navigation')[0];
        var isRefresh = navigationEntry && navigationEntry.type === 'reload';
        var hasPlayed = false;
        try { hasPlayed = sessionStorage.getItem('crystal-intro-played') === '1'; } catch (error) {}
        if (forceIntro || isRefresh || !hasPlayed) {
          document.documentElement.classList.add('is-intro-playing');
          try { sessionStorage.setItem('crystal-intro-played', '1'); } catch (error) {}
        } else {
          document.documentElement.classList.add('is-intro-done');
        }
      })();
    </script>
