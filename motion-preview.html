<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Cover Motion Preview</title><style>
*{box-sizing:border-box}body{margin:0;background:#080b11;color:#f5f7fb;font-family:Inter,"PingFang SC",sans-serif}.page{width:min(1200px,calc(100% - 48px));margin:auto;padding:68px 0 100px}.eyebrow{font:600 12px ui-monospace;color:#6f819f;letter-spacing:.15em}.head{display:grid;grid-template-columns:1fr .7fr;gap:64px;align-items:end;margin:20px 0 44px}.head h1{font-size:clamp(40px,7vw,76px);line-height:.95;letter-spacing:-.05em;margin:0}.head p{margin:0;color:#8f9db5;line-height:1.75}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}.card{position:relative;aspect-ratio:1600/532;border:1px solid #29344a;border-radius:22px;overflow:hidden;background:#111827}.cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.right{clip-path:inset(0 0 0 47%);transform-origin:75% 50%;transition:transform .8s cubic-bezier(.22,.8,.2,1)}.left{clip-path:inset(0 53% 0 0)}.card:hover .right{transform:scale(1.12)}.accent{position:absolute;z-index:3;display:block;aspect-ratio:1;animation:none}.a{left:56.3%;top:40%;width:2.8%;border-radius:28%;background:linear-gradient(135deg,#4b9ee6,#7c7bef);box-shadow:0 8px 18px #397cca55;transform:rotate(-12deg)}.b{left:84%;top:71%;width:1.8%;border-radius:50%;background:linear-gradient(135deg,#f1c765,#e9827f);box-shadow:0 7px 15px #dc845044}.card:hover .a{animation:up 2.8s ease-in-out infinite}.card:hover .b{animation:down 2.8s ease-in-out infinite}@keyframes up{50%{translate:0 -12px}}@keyframes down{50%{translate:0 10px}}.card:before{content:"";position:absolute;z-index:4;inset:0 0 auto;height:3px;background:linear-gradient(90deg,transparent,#75efb6,#4f8eea,transparent);background-size:200% 100%;opacity:0}.card:hover:before{opacity:.85;animation:sweep 2.8s linear infinite}@keyframes sweep{to{background-position:-200% 0}}.label{position:absolute;left:18px;bottom:14px;z-index:5;padding:7px 10px;border-radius:999px;background:#080b11aa;backdrop-filter:blur(8px);font-size:11px;color:#c6d1e3;opacity:0;transition:.25s}.card:hover .label{opacity:1}.note{margin-top:24px;padding:20px 22px;border-radius:16px;background:#101722;border:1px solid #273248;color:#8e9bb1;line-height:1.7}.note strong{color:#d9e4f5}@media(max-width:850px){.head,.grid{grid-template-columns:1fr}}
</style></head><body><main class="page"><div class="eyebrow">Crystal Portfolio / Motion Study 02</div><div class="head"><h1>Hover to<br>expand.</h1><p>鼠标进入后，右侧抽象图平滑放大至 112%；移开后自然回到原尺寸。两侧几何装饰只在 Hover 中做上下浮动。整体节奏由当前 1.4 秒放慢为 2.8 秒。</p></div><section class="grid" id="grid"></section><div class="note"><strong>本页只演示动效，不会改变正式网页。</strong> 封面右侧抽象图的统一尺寸需要回到 Figma 调整；确认这套运动方式后，再同时更新 Figma 导出图与网页 Hover。</div></main><script>
const data=[['bigdata','大数据工作台'],['ifcloud','IFCLOUD 多云管理平台'],['boss','BOSS 运维运营平台'],['qui','QUI Design System']];document.getElementById('grid').innerHTML=data.map(([slug,label])=>`<article class="card"><img class="cover left" src="/assets/project-covers/${slug}-dark.png"><img class="cover right" src="/assets/project-covers/${slug}-dark.png"><i class="accent a"></i><i class="accent b"></i><span class="label">${label}</span></article>`).join('');
</script></body></html>
