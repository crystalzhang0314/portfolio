<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Crystal Logo Finalists</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/brand.css">
  <style>
    :root{color-scheme:dark;--bg:#08080a;--panel:#101013;--line:rgba(255,255,255,.09);--muted:#7d7d88;--text:#f4f4f6;--accent:#a8f57a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 22% 8%,rgba(168,245,122,.1),transparent 28%),var(--bg);color:var(--text);font-family:"PingFang SC",sans-serif;min-height:100vh}main{width:min(1040px,calc(100% - 40px));margin:auto;padding:70px 0 90px}.back{color:var(--muted);text-decoration:none}.eyebrow{margin-top:46px;color:var(--accent);font:500 13px "Roboto Condensed Local",sans-serif;letter-spacing:.18em}.title{margin:14px 0 12px;font:500 clamp(44px,7vw,78px)/1 "Roboto Condensed Local",sans-serif}.intro{margin:0 0 40px;color:var(--muted);line-height:1.8}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.card{padding:26px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(145deg,rgba(255,255,255,.046),rgba(255,255,255,.012))}.stage{height:250px;display:flex;align-items:center;justify-content:center;border-radius:15px;background:#0a0a0d;border:1px solid rgba(255,255,255,.05)}.stage img{width:min(86%,260px);height:auto}.index{margin-top:24px;color:var(--accent);font:500 13px "Roboto Condensed Local",sans-serif;letter-spacing:.15em}.card h2{margin:9px 0;font-size:21px}.card p{min-height:76px;margin:0 0 22px;color:var(--muted);font-size:14px;line-height:1.75}.button{display:inline-flex;padding:11px 18px;border-radius:999px;background:linear-gradient(135deg,#a8f57a,#4dd4ac,#4a90d4);color:#07110d;text-decoration:none;font-size:14px;font-weight:600}.secondary{margin-left:8px;background:transparent;color:var(--text);border:1px solid var(--line)}@media(max-width:760px){.grid{grid-template-columns:1fr}.stage{height:210px}.card p{min-height:0}}
  </style>
</head>
<body><main>
  <a class="back" href="/">← 返回作品集</a>
  <div class="eyebrow">CRYSTAL · TWO DIRECTIONS</div>
  <h1 class="title">Logo finalists.</h1>
  <p class="intro">根据你选择的方案 1 与方案 5 各生成一版。点击按钮可放入完整首页导航中查看真实尺寸效果。</p>
  <section class="grid">
    <article class="card"><div class="stage"><img src="/assets/branding/crystal-wordmark.svg" alt="Crystal 纯英文字标"></div><div class="index">01 · WORDMARK</div><h2>切光字标</h2><p>完全移除独立图形，以 Crystal 本身作为 Logo。C 中加入一道晶体切光，句点作为收尾，个人感更强且导航最简洁。</p><a class="button" href="/?logo=wordmark">放入首页预览</a><a class="button secondary" href="/assets/branding/crystal-wordmark.svg">SVG</a></article>
    <article class="card"><div class="stage"><img src="/assets/branding/crystal-bauhaus.svg" alt="Crystal CZ 包豪斯 Logo"></div><div class="index">05 · BAUHAUS</div><h2>几何 CZ</h2><p>以圆弧构成 C、斜线与横线构成 Z，通过统一网格叠合。更理性、更像专业设计品牌，也适合头像和图标。</p><a class="button" href="/?logo=bauhaus">放入首页预览</a><a class="button secondary" href="/assets/branding/crystal-bauhaus.svg">SVG</a></article>
  </section>
</main></body></html>
